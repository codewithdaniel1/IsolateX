# RBAC for the IsolateX worker agent running inside the cluster.
# Grants only the minimum permissions needed to create/delete challenge pods and services.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: isolatex-worker
  namespace: kctf

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: isolatex-worker
  namespace: kctf
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: isolatex-worker
  namespace: kctf
subjects:
  - kind: ServiceAccount
    name: isolatex-worker
    namespace: kctf
roleRef:
  kind: Role
  name: isolatex-worker
  apiGroup: rbac.authorization.k8s.io
