# LimitRange — caps resources for every pod in the kctf namespace.
# Prevents a single challenge instance from starving the node.
apiVersion: v1
kind: LimitRange
metadata:
  name: isolatex-limits
  namespace: kctf
spec:
  limits:
    - type: Pod
      max:
        cpu: "4"
        memory: 2Gi
      min:
        cpu: 50m
        memory: 32Mi
    - type: Container
      default:
        cpu: "1"
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 2Gi
      min:
        cpu: 50m
        memory: 32Mi
