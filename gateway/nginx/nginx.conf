# IsolateX — Nginx gateway configuration
# Use this if you prefer Nginx over Traefik.
# Instance routes are written to /etc/nginx/conf.d/isolatex/ by the
# orchestrator's Nginx sidecar and nginx -s reload is called after each change.
# See gateway/nginx/reload-sidecar.py for the sidecar script.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Security headers applied to all virtual hosts
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # TLS defaults (individual servers override certfile/keyfile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Rate limiting — prevent brute-force on challenge endpoints
    limit_req_zone $binary_remote_addr zone=challenge:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;

    # CTFd scoreboard
    server {
        listen 443 ssl;
        server_name ctf.osiris.sh;

        ssl_certificate     /etc/letsencrypt/live/ctf.osiris.sh/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ctf.osiris.sh/privkey.pem;

        location / {
            proxy_pass http://ctfd:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=challenge burst=20 nodelay;
        }
    }

    # HTTP → HTTPS redirect
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Wildcard challenge instances: *.ctf.osiris.sh
    # Each instance gets its own config file in conf.d/isolatex/
    server {
        listen 443 ssl;
        server_name ~^(?<instance>[a-f0-9]+)\.(?<challenge>[a-z0-9\-]+)\.ctf\.osiris\.sh$;

        ssl_certificate     /etc/letsencrypt/live/ctf.osiris.sh/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ctf.osiris.sh/privkey.pem;

        location / {
            # Upstream is set per-instance in conf.d/isolatex/<instance_id>.conf
            proxy_pass http://$instance_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            limit_req zone=challenge burst=10 nodelay;
        }
    }

    # Include per-instance upstream blocks generated by the sidecar
    include /etc/nginx/conf.d/isolatex/*.conf;
}
